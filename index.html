<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Human-AI Collaborative Design 111 Center</title>
    <link rel="preload" as="image" href="./111%20CH-2.svg" />
    <link rel="preload" as="image" href="./111%20EN-2.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page-shell" aria-label="111 Center static page">
      <div class="figma-page" id="figmaPage">
        <img
          id="pageImage"
          class="page-image"
          src="./111%20CH-2.svg"
          alt="人智协同设计 学科创新引领基地"
          width="1440"
          height="3728"
        />

        <button class="hotspot" type="button" data-action="scroll" data-target="home" aria-label="Home"></button>
        <button class="hotspot" type="button" data-action="scroll" data-target="intro" aria-label="Introduction"></button>
        <button class="hotspot" type="button" data-action="scroll" data-target="themes" aria-label="Themes"></button>
        <button class="hotspot" type="button" data-action="scroll" data-target="leads" aria-label="Project Leads"></button>
        <button class="hotspot" type="button" data-action="lang" data-lang="en" aria-label="Switch to English"></button>
        <button class="hotspot" type="button" data-action="lang" data-lang="zh" aria-label="切换到中文"></button>
      </div>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
