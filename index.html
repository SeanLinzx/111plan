<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Human-AI Collaborative Design 111 Center</title>
    <link rel="preload" as="image" href="./111%20EN.svg" />
    <link rel="preload" as="image" href="./assets/prof-ji-tie.png" />
    <link rel="preload" as="image" href="./assets/prof-nick-bryan-kinns.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page-shell" aria-label="111 Center static page">
      <div class="figma-page" id="figmaPage">
        <img
          id="pageImage"
          class="page-image"
          src="./111%20EN.svg"
          alt="Human-AI Collaborative Design Center for International Cooperation and Disciplinary Innovation supported by the 111 Center"
          width="1440"
          height="3728"
        />

        <div class="text-layer" id="textLayer" aria-label="Selectable page text"></div>

        <div class="avatar-layer" aria-hidden="true">
          <img
            class="avatar-replacement avatar-replacement--ji"
            src="./assets/prof-ji-tie.png"
            alt=""
            width="388"
            height="388"
          />
          <img
            class="avatar-replacement avatar-replacement--nick"
            src="./assets/prof-nick-bryan-kinns.png"
            alt=""
            width="388"
            height="388"
          />
        </div>

        <button class="hotspot" type="button" data-action="scroll" data-target="home" aria-label="Home"></button>
        <button class="hotspot" type="button" data-action="scroll" data-target="intro" aria-label="Introduction"></button>
        <button class="hotspot" type="button" data-action="scroll" data-target="themes" aria-label="Themes"></button>
        <button class="hotspot" type="button" data-action="scroll" data-target="leads" aria-label="Project Leads"></button>
      </div>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
